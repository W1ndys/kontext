layers:
  - name: "CLI 命令入口层"
    description: "以 cmd 为入口，负责解析命令行参数、与用户交互、组装运行参数，并调用内部应用服务执行 init、pack、update、validate、config 等工作流。该层不直接承载核心领域规则，主要承担流程编排与终端展示职责。"
    packages:
      - "cmd"

  - name: "应用流程编排层"
    description: "围绕核心用例组织多阶段流程，负责把 schema、文件扫描、模板、LLM 能力组合成可执行工作流。generator 负责初始化生成与扫描生成流程，packer 负责 Prompt 打包流水线，updater 负责变更检测后的更新执行。"
    packages:
      - "internal/generator"
      - "internal/packer"
      - "internal/updater"

  - name: "配置与知识模型层"
    description: "负责定义和加载 Kontext 的标准知识物料与运行配置。schema 定义 .kontext 下各类 YAML 结构及校验逻辑，config 负责全局 LLM 配置的持久化与转换，是应用流程共享的数据契约中心。"
    packages:
      - "internal/schema"
      - "internal/config"

  - name: "LLM 适配层"
    description: "封装与 OpenAI 兼容接口的交互细节，提供普通生成、多轮对话、流式输出、结构化输出、模型列表与重试相关能力，为上层流程提供统一的 llm.Client 抽象。"
    packages:
      - "internal/llm"

  - name: "模板与文档输出层"
    description: "负责提示词模板资产与最终 Prompt 文档落盘。templates 以 embed 方式提供各阶段模板文本，promptdoc 负责 Prompt 文件命名与保存，服务于 generator、packer、updater 的内容生成环节。"
    packages:
      - "templates"
      - "internal/promptdoc"

  - name: "底层支撑设施层"
    description: "提供与业务无关但被多处复用的基础能力，包括文件系统访问、目录扫描、内容读写、文件摘要提取、扫描检查点缓存与哈希计算、结构化日志输出、终端 UI 交互组件等，是上层流程的运行时支撑。"
    packages:
      - "internal/fileutil"
      - "internal/cache"
      - "internal/logging"
      - "internal/ui"

rules:
  - rule: "cmd 层负责参数解析、交互确认、进度展示与错误转译，不应实现 YAML 解析、LLM 协议细节或文件筛选算法。"
    reason: "cmd/init.go、cmd/update.go、cmd/pack.go 都以命令为中心做 I/O 和流程触发，实际生成、打包、更新逻辑分别委托给 generator、packer、updater、schema、llm。"

  - rule: "应用流程编排层必须由 CLI 单向调用，不反向依赖 cmd 包。"
    reason: "internal/generator、internal/packer、internal/updater 均被 cmd 引用，但其源码未引入 cmd，体现了清晰的入口层到应用层单向依赖。"

  - rule: "generator、packer、updater 可以共享 schema、llm、fileutil、templates 等下层能力，但彼此应通过显式编排协作而非形成循环依赖。"
    reason: "当前三个包都直接面向共同的下层依赖；源码中未显示它们相互导入，说明模块间以并列应用服务方式组织。"

  - rule: "schema 是 .kontext 物料的唯一结构定义与校验中心，其他层读写 YAML 时必须遵循 schema 中的类型约束。"
    reason: "internal/schema 定义了 ProjectManifest、ArchitectureMap、Conventions、ModuleContract，并由 loader/ValidateBundle 统一加载与校验。"

  - rule: "LoadBundle 以 PROJECT_MANIFEST.yaml 为必需输入，Architecture、Conventions、Contracts 允许缺失并按零值容错。"
    reason: "internal/schema/loader.go 中显式将 manifest 作为必须项，而其他物料文件存在即加载、不存在则跳过。"

  - rule: "validate 命令只通过 schema.ValidateBundle 执行一致性校验，不自行复制校验规则。"
    reason: "cmd/validate.go 直接调用 schema.ValidateBundle，表明校验规则集中于 schema 层。"

  - rule: "所有与模型提供商交互的实现都应收敛到 internal/llm，业务流程只能依赖 llm.Client 抽象或辅助函数。"
    reason: "NewClient、openaiClient、ChatStructured、ChatStream 等能力都集中在 llm 包，上层只传入配置或 client 实例，不直接触碰 openai-go。"

  - rule: "LLM 适配层向上暴露普通生成、流式对话和结构化输出三类接口，以满足 init、pack、update 的不同生成模式。"
    reason: "generator 需要结构化 YAML 与多轮问答，packer 需要流式生成 Prompt，updater 需要受控更新 YAML，这些能力均由 llm 包统一提供。"

  - rule: "配置读取必须先经过 internal/config，再转换为 llm.Config 供模型客户端使用。"
    reason: "cmd/init.go、cmd/update.go、cmd/config.go 均通过 config.Load 和 ToLLMConfig 获取 LLM 连接参数，没有直接拼装 llm.Config。"

  - rule: "templates 包只存放嵌入式模板常量，不承担业务决策；模板渲染与调用时机由 generator、packer、updater 决定。"
    reason: "templates/templates.go 仅通过 go:embed 暴露模板文本，而 RenderTemplate、RenderSystemPrompt、renderUserPrompt 等逻辑分别位于上层流程包中。"

  - rule: "pack 流水线必须遵循固定的阶段式上下文收集顺序：加载物料 -> 扫描候选文件 -> LLM 识别相关文件 -> 粗筛收集 -> 可选精筛 -> 整理上下文 -> 渲染模板 -> 流式生成 -> 保存文档。"
    reason: "internal/packer/engine.go 将流程拆为 9 个阶段，并在每个阶段输出进度，体现这是核心架构约束而非任意调用顺序。"

  - rule: "packer 不直接全量读取整个仓库源码，而是先扫描路径、提取摘要、限制候选数量与总字节数，再决定最终附带的代码片段。"
    reason: "collector.go 中存在 ScanCandidateFiles、ExtractFileSummary、maxCandidateFiles、maxIdentifiedTotalBytes、HydrateContext 等限制逻辑，说明项目有明确的上下文预算控制。"

  - rule: "模块契约在 pack 阶段既可通过任务关键词匹配，也可依据最终相关文件进一步过滤，不应无差别全部注入 Prompt。"
    reason: "packer/matcher.go 的 MatchContracts 与 collector.go 的 filterContractsByRelevantFiles 共同表明契约使用是分层筛选的。"

  - rule: "自动扫描初始化流程必须支持检查点缓存、断点恢复和强制重跑三种模式。"
    reason: "cmd/init.go 中存在 --fresh、--resume、cache.IsCheckpointValid、runScanInitFromCheckpoint 等逻辑，说明扫描初始化被设计为可恢复流水线。"

  - rule: "缓存能力属于流程支撑设施，只为扫描初始化等长流程提供阶段恢复，不应混入 schema 或 LLM 语义。"
    reason: "internal/cache 独立于 generator、schema、llm，仅被 cmd/init.go 等流程用于检查点有效性与清理。"

  - rule: "文件系统访问、目录扫描、读写和摘要提取统一通过 fileutil 提供，业务层不应在多个包中重复实现底层 I/O。"
    reason: "generator、schema、packer、updater、cmd 多处都依赖 internal/fileutil，说明其被定位为统一基础设施。"

  - rule: "日志输出统一通过 internal/logging 提供，业务层不应自行实现日志格式化或级别控制。"
    reason: "internal/logging 作为独立基础设施包，为各层提供结构化日志能力，避免日志实现散落在多个包中。"

  - rule: "终端 UI 交互组件统一通过 internal/ui 提供，业务层不应自行实现进度展示、确认提示等终端交互逻辑。"
    reason: "internal/ui 作为独立基础设施包，为 cmd 层及上层流程提供可复用的终端交互能力，避免 UI 实现散落在多个包中。"

  - rule: "update 功能采用先检测再规划再执行的三段式结构，其中 detector 只负责发现偏差，planner 只负责生成动作，executor 只负责落地更新。"
    reason: "internal/updater 被拆分为 detector.go、planner.go、executor.go、types.go，职责边界在文件与调用关系上都很明确。"

  - rule: "update 执行前必须向用户展示计划并确认，执行后必须再次通过 schema.ValidateBundle 校验整体物料。"
    reason: "cmd/update.go 中先 printPlannedUpdates 和 confirmPlannedUpdates，再调用 executor.Execute；executor 末尾会执行 ValidateBundle。"

  - rule: "模块契约更新是 update 中唯一显式并发化的子流程，architecture 与 manifest 更新按动作顺序串行执行。"
    reason: "executor.go 中 executeContractBatch 使用 goroutine、WaitGroup 和 semaphore，其他 target 则在 Execute 的主循环中逐项处理。"

  - rule: "更新写入必须具备备份与回滚准备，任何覆盖型写入都应先走 backupIfExists 语义。"
    reason: "updater.Executor 持有 backupStamp，并在 applyAction 流程周边提供 backupIfExists 和 pruneBackups，说明安全更新是既定策略。"

  - rule: "所有生成出的 .kontext 物料在落盘前都应先进行 YAML 合法性校验。"
    reason: "generator.WriteGeneratedYAML 会先 ValidateYAML 再写入各文件；updater 也会对生成内容做 validateGeneratedContent，并在末尾整体验证。"

  - rule: "promptdoc 仅负责 Prompt 文件命名和保存，不参与上下文筛选、LLM 调用或模板决策。"
    reason: "packer.Engine 在最后阶段调用 promptdoc.GenerateFilename 和 SavePrompt，表明它是输出适配器而不是业务编排者。"

  - rule: "设计文档与模板文件属于知识资产，不直接进入运行时依赖层级，但它们驱动 generator、packer、updater 的生成策略。"
    reason: "docs 目录保存演进方案，templates 目录保存各阶段提示词模板；实际运行时由相应流程包读取嵌入模板来执行策略。"