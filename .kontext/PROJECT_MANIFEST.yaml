# .kontext/PROJECT_MANIFEST.yaml
# 用途：AI 开发助手的首要阅读文件，建立项目全局理解
# 使用方式：每次执行 kontext 相关代码开发任务前，首先载入此文件

project:
  name: "kontext"
  one_line: "AI 时代的上下文编译器，将项目知识转化为大模型可直接消费的结构化物料"
  type: "cli_tool"

  # AI 需要理解的业务上下文
  business_context: |
    这是一个完全面向 AI 辅助编程（AI-Native Development）的底层工具。
    传统的项目文档是给"人"看的，充满了隐式上下文；而 Kontext 的目标是生成高密度的、声明式的 YAML 物料给"大模型"看。
    核心痛点：低级模型容易产生幻觉，高级模型受限于 token 窗口。
    解决方案：通过精确分析任务，打包最小但最全的上下文（Pack），并保持代码与物料的双向同步（Update）。

  # 核心业务流程
  core_flows:
    - name: "Pack 流程 (核心打包)"
      steps: "解析任务描述 → 调 LLM 分析涉及模块 → 收集源码与物料 → 按优先级裁剪 Token → 渲染最终 Prompt"
      entry_point: "internal/packer/engine.go"

    - name: "Generate 流程 (物料生成)"
      steps: "交互式澄清需求 → 识别项目类型 → 渲染 pongo2 模板并用 LLM 填充细节 → 写入 .kontext/ 目录"
      entry_point: "internal/generator/engine.go"

    - name: "Update 流程 (逆向同步)"
      steps: "读取 git diff → 解析变更影响面 → 调 LLM 生成物料更新建议 → 用户确认 → 覆写 YAML 文件"
      entry_point: "internal/updater/engine.go"

tech_stack:
  language: "Go 1.21+"
  cli_framework: "spf13/cobra"
  yaml_parser: "gopkg.in/yaml.v3"
  schema_validator: "go-playground/validator/v10"
  template_engine: "flosch/pongo2/v6"
  llm_client: "net/http (自定义封装，兼容 OpenAI API 规范)"
  git_client: "go-git/go-git/v5"

  # AI 必须严格遵守的技术决策及原因
  key_decisions:
    - decision: "单二进制文件分发，零外部依赖"
      reason: "CLI 工具的下载即用体验是第一优先级"
      constraint: "严禁引入需要 CGO 或依赖宿主机特定环境的第三方库"

    - decision: "采用 Standard Go Project Layout"
      reason: "确保项目结构清晰，符合社区规范"
      constraint: "所有非暴露的核心逻辑必须放在 internal/ 目录下；CLI 入口必须放在 cmd/kontext/ 下"

    - decision: "三大核心引擎（packer, generator, updater）绝对解耦"
      reason: "保证各引擎可独立演进，避免逻辑污染"
      constraint: "这三个 package 之间严禁互相 import！只能共同依赖 internal/schema 或 internal/fileutil"

# 项目规模概览
scale:
  estimated_files: 30-50
  modules: 3 (核心引擎)
  phase: "bootstrapping (自举阶段)"

# 当前状态
status:
  completed_modules: ["schema (部分)"]
  in_progress: ["packer"]
  not_started: ["generator", "updater", "cmd"]
