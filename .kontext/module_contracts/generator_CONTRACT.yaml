module:
  name: "generator"
  path: "internal/generator"
  purpose: |
    负责编排 Kontext 初始化阶段的内容生成流程，包括交互式需求澄清、基于模板构造 LLM 请求、解析结构化响应、校验生成出的 YAML 文本，并将 PROJECT_MANIFEST、ARCHITECTURE_MAP、CONVENTIONS 与模块契约写入 .kontext 目录。同时该模块也承载扫描初始化相关的结构化生成辅助能力，如文件分析、关键文件选择、依赖图生成、模块范围过滤与流式模块契约生成。

owns:
  - "交互式初始化两阶段流程编排：先多轮访谈澄清需求，再生成项目级 YAML 物料"
  - "将 templates 中的系统提示词和用户提示词渲染为具体 LLM 输入"
  - "调用 llm.Client 执行普通生成、结构化生成与流式生成请求"
  - "解析 LLM 返回的 JSON/文本，提取 InterviewResponse、GeneratedYAML、AnalyzedFiles、SelectedFiles、ModuleContractYAML 等结构"
  - "校验生成内容是否为合法 YAML，并在落盘前阻断明显无效输出"
  - "创建 .kontext、.kontext/module_contracts、.kontext/prompts 等初始化目录并写入生成文件"
  - "按照模块名过滤扫描得到的文件集合，辅助模块契约生成的输入裁剪"
  - "提供扫描初始化流水线所需的文件分析、关键文件选择、依赖图生成与单模块契约生成入口"

not_responsible_for:
  - "不负责命令行参数解析、终端命令注册或 Cobra 命令组织"
  - "不负责底层 OpenAI 兼容协议、重试细节或流式传输实现"
  - "不负责定义 .kontext 物料的领域 schema 或执行基于 schema 的完整业务校验"
  - "不负责通用文件扫描、目录遍历或底层文件 I/O 的基础设施实现"
  - "不负责 pack 阶段的上下文收集、相关文件识别与 Prompt 文档生成"
  - "不负责 update 阶段的差异检测、更新计划制定与批量更新执行"

depends_on:
  - module: "fileutil"
    reason: "用于创建 .kontext 目录、写入生成文件，以及复用底层文件系统辅助能力"
  - module: "llm"
    reason: "通过 llm.Client 发起多轮访谈、结构化 YAML 生成、扫描分析与模块契约生成请求"
  - module: "templates"
    reason: "读取并渲染 init、scan、contract 等阶段的嵌入式提示词模板"

public_interface:
  - name: "RunInteractiveInit"
    signature: "func RunInteractiveInit(client llm.Client, description string) error"
    description: "执行交互式初始化完整流程，先通过多轮访谈澄清需求，再生成并写入 .kontext 配置物料"
  - name: "WriteGeneratedYAML"
    signature: "func WriteGeneratedYAML(generated *GeneratedYAML) error"
    description: "对生成出的核心 YAML 与模块契约进行合法性校验，并将其写入 .kontext 目录结构"
  - name: "ValidateYAML"
    signature: "func ValidateYAML(content string) error"
    description: "校验一段 YAML 文本是否语法合法，可在落盘前用于快速拦截无效输出"
  - name: "GenerateStructuredYAML"
    signature: "func GenerateStructuredYAML(client llm.Client, systemPrompt, userMsg string) (*GeneratedYAML, error)"
    description: "调用 LLM 生成包含 manifest、architecture、conventions 与模块契约的结构化结果"
  - name: "AnalyzeProjectFiles"
    signature: "func AnalyzeProjectFiles(client llm.Client, systemPrompt, userMsg string) (*AnalyzedFiles, error)"
    description: "调用 LLM 对项目文件进行分析，输出扫描初始化阶段所需的关键文件识别结果"
  - name: "SelectKeyFiles"
    signature: "func SelectKeyFiles(client llm.Client, systemPrompt, userMsg string) (*SelectedFiles, error)"
    description: "调用 LLM 从候选文件中筛选对架构与契约生成最关键的文件集合"
  - name: "GenerateDependencyGraph"
    signature: "func GenerateDependencyGraph(client llm.Client, systemPrompt, userMsg string) (*ModuleDependencyGraph, error)"
    description: "调用 LLM 生成模块依赖关系图，供扫描初始化阶段后续架构与契约生成使用"
  - name: "ParseModuleDependencyGraph"
    signature: "func ParseModuleDependencyGraph(content string) (*ModuleDependencyGraph, error)"
    description: "将文本形式的模块依赖图解析为结构化对象"
  - name: "RenderTemplate"
    signature: "func RenderTemplate(tmpl string, data interface{}) (string, error)"
    description: "使用 text/template 渲染模板文本，为各类 LLM 请求构造用户消息"
  - name: "GenerateSingleYAML"
    signature: "func GenerateSingleYAML(client llm.Client, systemPrompt, userMsg string) (string, error)"
    description: "调用 LLM 生成单个 YAML 文本结果，适用于分步生成场景"
  - name: "GenerateModuleContract"
    signature: "func GenerateModuleContract(client llm.Client, systemPrompt, userMsg string, moduleName string) (*ModuleContractYAML, error)"
    description: "为指定模块生成单个模块契约的结构化结果"
  - name: "FilterFilesByModule"
    signature: "func FilterFilesByModule(files map[string]string, moduleName string) map[string]string"
    description: "按模块名过滤文件内容映射，只保留属于目标模块的文件"
  - name: "BelongsToModule"
    signature: "func BelongsToModule(filePath, moduleName string) bool"
    description: "判断指定文件路径是否归属于某个模块，用于模块级输入裁剪"
  - name: "GenerateModuleContractStream"
    signature: "func GenerateModuleContractStream(...)"
    description: "以流式方式生成单个模块契约，供扫描初始化或增量更新场景复用"
  - name: "GenerateModuleContracts"
    signature: "func GenerateModuleContracts(...)"
    description: "批量生成多个模块契约，协调多模块的契约产出过程"
  - name: "ParseInterviewResponse"
    signature: "func ParseInterviewResponse(raw string) (*InterviewResponse, error)"
    description: "解析访谈阶段的 JSON 响应，提取问题、候选选项或需求摘要"
  - name: "ParseGeneratedJSON"
    signature: "func ParseGeneratedJSON(raw string) (*GeneratedYAML, error)"
    description: "解析生成阶段返回的 JSON 结构化结果，提取项目级 YAML 文本与模块契约集合"
  - name: "ParseAnalyzedFiles"
    signature: "func ParseAnalyzedFiles(raw string) (*AnalyzedFiles, error)"
    description: "解析文件分析阶段的结构化响应"
  - name: "ParseSelectedFiles"
    signature: "func ParseSelectedFiles(raw string) (*SelectedFiles, error)"
    description: "解析关键文件筛选阶段的结构化响应"
  - name: "ParseSingleFileJSON"
    signature: "func ParseSingleFileJSON(raw string) (*SingleFileYAML, error)"
    description: "解析单文件 YAML 生成结果的 JSON 响应"
  - name: "ParseModuleContractJSON"
    signature: "func ParseModuleContractJSON(raw string) (*ModuleContractYAML, error)"
    description: "解析模块契约生成结果的 JSON 响应"
  - name: "InterviewResponse"
    signature: "type InterviewResponse struct { Type string `json:\"type\"`; Question string `json:\"question\"`; Options []string `json:\"options\"`; Summary string `json:\"summary\"` }"
    description: "表示 LLM 在访谈阶段返回的问题型或完成型结构化响应"
  - name: "GeneratedYAML"
    signature: "type GeneratedYAML struct { ProjectManifest string `json:\"project_manifest\"`; ArchitectureMap string `json:\"architecture_map\"`; Conventions string `json:\"conventions\"`; ModuleContracts map[string]string `json:\"module_contracts\"` }"
    description: "表示初始化生成阶段返回的核心 YAML 物料集合"

modification_rules:
  - rule: "新增或修改生成流程时，必须保持对 llm.Client 抽象的依赖，不得直接在本模块中引入具体模型供应商 SDK 调用。"
    reason: "模块边界要求 LLM 协议细节收敛到 llm 层，避免 generator 与具体供应商实现耦合。"
  - rule: "所有新增的落盘逻辑都必须先进行 YAML 合法性校验，再调用 fileutil 写入目标路径。"
    reason: "该模块是 .kontext 物料生成入口，若跳过校验会把无效配置传播到 validate、pack 与 update 下游。"
  - rule: "模板文本必须继续来自 templates 包，业务代码只负责渲染和传参，不得把大段提示词硬编码在流程函数中。"
    reason: "模板资产已被独立管理，硬编码会破坏提示词可维护性并与既有架构约束冲突。"
  - rule: "交互式初始化流程必须维持'访谈澄清 -> 需求摘要 -> YAML 生成'的两阶段顺序。"
    reason: "RunInteractiveInit 的核心价值在于先收敛需求再生成配置，跳过摘要阶段会降低输出稳定性。"
  - rule: "解析 LLM 返回内容时必须兼容 markdown 代码块包裹、JSON 解析失败与空字段回退等异常情况。"
    reason: "该模块直接面对不稳定的模型输出，鲁棒解析是保证生成成功率的关键。"
  - rule: "模块级文件过滤逻辑只能基于路径归属做输入裁剪，不应在此处引入 schema、pack 或 update 的业务判断。"
    reason: "FilterFilesByModule 和 BelongsToModule 属于生成前处理辅助函数，越界会导致模块职责膨胀。"
  - rule: "扩展扫描初始化相关结构时，应优先通过 types.go 中的结构体统一声明输入输出格式。"
    reason: "本模块对外的结构化契约集中在 types.go，分散定义会增加解析与调用方的不一致风险。"
  - rule: "不得让 generator 反向依赖 cmd、schema、packer 或 updater。"
    reason: "依赖图规定 generator 只依赖 fileutil、llm、templates，反向扩张会破坏分层并可能引入循环依赖。"