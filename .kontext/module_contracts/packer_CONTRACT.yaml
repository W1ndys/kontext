module:
  name: "packer"
  path: "internal/packer"
  purpose: |
    编排基于任务描述的 Prompt 打包流水线。从 .kontext 物料加载项目知识，扫描项目文件生成候选清单，
    借助 LLM 识别并精筛与任务相关的源码上下文，匹配模块契约，构建模板渲染数据，最终生成面向大模型消费的 Prompt 文档。

owns:
  - "Pack 十阶段流水线编排（加载物料、扫描候选文件、识别相关文件、粗筛上下文、预加载文件内容、可选精筛、整理上下文、渲染模板、调用 LLM 生成文档、保存输出）"
  - "基于目录树扫描、文件摘要提取和代码片段预加载的上下文收集"
  - "基于任务描述与项目架构/模块摘要的相关文件识别（含批量分片与合并）"
  - "基于候选文件摘要、已识别文件与模块契约的上下文精筛"
  - "基于任务关键词与最终相关文件路径的模块契约筛选"
  - "Prompt 模板数据组装与系统/用户提示词渲染"
  - "Prompt 输出文件命名提示与最终文档保存前的调用编排"

not_responsible_for:
  - "定义或校验 .kontext YAML 物料结构本身"
  - "实现底层文件系统扫描、读写与摘要提取细节"
  - "实现具体的 OpenAI 协议适配、流式传输和重试底层机制"
  - "维护嵌入式模板资源内容本身"
  - "提供 CLI 参数解析、终端交互和命令入口"

depends_on:
  - module: "fileutil"
    reason: "用于扫描项目目录树、提取文件摘要并读取候选源码内容，支撑上下文收集阶段"
  - module: "llm"
    reason: "用于相关文件识别、上下文精筛以及最终 Prompt 文档的流式生成"
  - module: "promptdoc"
    reason: "用于根据任务生成输出文件名并将最终 Prompt 文档保存到 .kontext/prompts"
  - module: "schema"
    reason: "用于加载 .kontext Bundle，并使用模块契约与架构信息参与上下文筛选和模板组装"
  - module: "templates"
    reason: "用于渲染文件识别、上下文精筛及最终 Prompt 生成所需的提示词模板"

public_interface:
  - name: "Engine"
    signature: "type Engine struct { llmClient llm.Client; kontextDir string; projectDir string; OnProgress func(stage, total int, msg string); DisableRefine bool; FilenameHint string }"
    description: "Pack 流水线编排器，持有运行所需的 LLM 客户端、项目路径和进度回调配置"
  - name: "NewEngine"
    signature: "func NewEngine(llmClient llm.Client, kontextDir, projectDir string) *Engine"
    description: "创建新的 Pack 引擎实例"
  - name: "Pack"
    signature: "func (e *Engine) Pack(task string) (string, error)"
    description: "执行完整 Pack 流程（10 阶段），返回生成的 Prompt 文档绝对路径"
  - name: "CandidateContext"
    signature: "type CandidateContext struct { DirectoryTree []string; MatchedFiles []string; FileSummaries map[string]string; CodeSnippets map[string]string; Contracts []schema.ModuleContract; RelevantFiles []FileRelevance; MentionedReasons map[string]string; IdentifiedFiles []IdentifiedFile }"
    description: "保存候选目录树、匹配文件、摘要、代码片段、模块契约和精筛结果等上下文数据"
  - name: "ScanCandidateFiles"
    signature: "func ScanCandidateFiles(root string) ([]string, error)"
    description: "扫描项目目录并返回候选文件相对路径列表"
  - name: "CollectContext"
    signature: "func CollectContext(bundle *schema.Bundle, task string, root string, mentionedFiles *MentionedFiles) (*CandidateContext, error)"
    description: "执行粗筛上下文收集，构建目录树、文件摘要和初步模块契约集合"
  - name: "PreloadIdentifiedFiles"
    signature: "func PreloadIdentifiedFiles(root string, ctx *CandidateContext) error"
    description: "为已匹配文件预读取源码片段，填充可直接发送给后续精筛阶段的文件内容"
  - name: "HydrateContext"
    signature: "func HydrateContext(task string, ctx *CandidateContext, refine *RefineResult)"
    description: "根据精筛结果整理最终相关文件、过滤契约并构建最终附带源码上下文"
  - name: "BuildTemplateData"
    signature: "func BuildTemplateData(task string, bundle *schema.Bundle, ctx *CandidateContext) *TemplateData"
    description: "将 Bundle 与上下文数据转换为最终 Prompt 模板渲染数据"
  - name: "MentionedFiles"
    signature: "type MentionedFiles struct { Paths []string `json:\"paths\"`; Reasons map[string]string `json:\"reasons\"` }"
    description: "文件识别阶段返回的相关文件列表及其识别原因"
  - name: "IdentifiedFile"
    signature: "type IdentifiedFile struct { Path string `json:\"path\"`; Reason string `json:\"reason\"`; Content string `json:\"content\"`; Truncated bool `json:\"truncated\"` }"
    description: "单个被识别并附带源码内容的文件"
  - name: "IdentifyRelevantFiles"
    signature: "func IdentifyRelevantFiles(client llm.Client, task string, candidatePaths []string, projectRoot, architectureSummary, moduleSummary string, onRetry func(attempt int, err error, backoff time.Duration)) (*MentionedFiles, error)"
    description: "调用 LLM 从候选路径中识别与任务相关的文件，支持分批处理与结果合并"
  - name: "MatchContracts"
    signature: "func MatchContracts(task string, contracts []schema.ModuleContract) []schema.ModuleContract"
    description: "根据任务关键词从全部模块契约中匹配出相关契约集合"
  - name: "CandidateFile"
    signature: "type CandidateFile struct { Path string `json:\"path\"`; Summary string `json:\"summary\"` }"
    description: "发送给上下文精筛模型的候选文件摘要项"
  - name: "RefineContext"
    signature: "func RefineContext(client llm.Client, task string, candidates []CandidateFile, contracts []schema.ModuleContract, identifiedFiles []IdentifiedFile, onRetry func(attempt int, err error, backoff time.Duration)) (*RefineResult, error)"
    description: "调用 LLM 对候选文件和契约进行精筛，返回最终相关上下文"
  - name: "FileRelevance"
    signature: "type FileRelevance struct { Path string `json:\"path\"`; Score float64 `json:\"score\"`; Reason string `json:\"reason\"` }"
    description: "精筛阶段返回的单个文件相关性评分与原因"
  - name: "RefineResult"
    signature: "type RefineResult struct { RelevantFiles []FileRelevance `json:\"relevant_files\"`; RelevantContracts []string `json:\"relevant_contracts\"` }"
    description: "上下文精筛阶段的完整返回结果"
  - name: "TemplateData"
    signature: "type TemplateData struct { Task string; ProjectName string; ProjectOneLine string; ProjectType string; Phase string; ArchitectureSummary string; TechStack []string; Conventions []string; Contracts []schema.ModuleContract; ContextFiles []ContextFileData; DirectoryTree string }"
    description: "最终 Prompt 模板渲染所需的完整数据结构"
  - name: "ContextFileData"
    signature: "type ContextFileData struct { Path string; Language string; Content string; Reason string; Truncated bool }"
    description: "模板渲染中单个上下文文件的路径、语言、内容、原因及截断标记"

modification_rules:
  - rule: "必须保持 Pack 流水线的阶段顺序与职责边界，不得将文件识别、精筛、模板渲染或保存步骤随意交叉或合并。"
    reason: "engine.go 以 packStages(10) 个阶段组织流程，架构约束要求 pack 采用固定阶段式上下文构建顺序。"
  - rule: "新增上下文数据时，必须遵守 limits.go 中定义的候选文件数量、上下文文件数量、单文件字节数和总字节数限制。"
    reason: "collector.go 通过 maxCandidateFiles、maxContextFiles、maxIdentifiedFileBytes、maxIdentifiedTotalBytes 等限制控制上下文预算。"
  - rule: "任何 .kontext 物料读取或契约筛选逻辑都必须通过 schema 提供的数据结构进行，不得在 packer 内复制 schema 定义。"
    reason: "schema 是项目知识物料的唯一结构定义中心，避免格式漂移和校验分叉。"
  - rule: "与模型交互时必须依赖 llm.Client 等抽象，不得在本模块直接接入具体供应商 SDK。"
    reason: "模型适配细节收敛于 llm 模块，packer 只承担应用流程编排职责。"
  - rule: "修改模板渲染输入时须同步维护 BuildTemplateData 与渲染函数的数据一致性，不把模板文本硬编码到 packer。"
    reason: "模板资源由 templates 包统一管理，packer 只负责组装数据与决定调用时机。"
  - rule: "对外暴露的类型字段变更应保持向后兼容或同步更新所有调用链。"
    reason: "这些类型跨越 engine、collector、identifier、refiner 等多个文件，是 packer 内部协作的稳定接口。"
  - rule: "LLM 识别或精筛失败时应保持降级策略：记录告警并使用已有候选上下文继续生成。"
    reason: "engine.go 已实现失败后继续打包的容错行为，保证 CLI 可用性。"
  - rule: "保存输出文件的职责继续委托给 promptdoc，不在 packer 内部自行实现文件命名和落盘逻辑。"
    reason: "promptdoc 在架构中被定位为专用输出适配层。"
