module:
  name: "schema"
  path: "internal/schema"
  purpose: |
    定义 .kontext 目录下各类知识物料的结构化数据模型，并提供统一的 YAML 加载与解析校验能力。
    该模块是 PROJECT_MANIFEST、ARCHITECTURE_MAP、CONVENTIONS 以及模块契约文件的唯一类型契约中心，负责把磁盘上的 YAML 内容转换为稳定的 Go 结构，并在 validate 等流程中提供一致的基础校验结果。

owns:
  - "定义 PROJECT_MANIFEST.yaml 对应的数据结构，包括项目信息、技术栈、规模与状态等顶层模型"
  - "定义 ARCHITECTURE_MAP.yaml 对应的数据结构，包括架构层级与架构规则"
  - "定义 CONVENTIONS.yaml 对应的数据结构，包括编码规范、错误处理规范、禁用项与 AI 协作规则"
  - "定义模块 CONTRACT.yaml 对应的数据结构，包括模块信息、职责边界、依赖关系、公开接口与修改规则"
  - "从 .kontext 目录加载 manifest、architecture、conventions 以及 module_contracts 下的契约文件，并聚合为 Bundle"
  - "对 .kontext 物料执行 YAML 解析级别与基础必填字段级别的校验，向上层返回错误列表"

not_responsible_for:
  - "不负责扫描源码、推断模块边界或生成 YAML 内容"
  - "不负责执行 LLM 调用、提示词构造或流式输出"
  - "不负责底层文件系统实现细节，实际读写与目录扫描由 fileutil 提供"
  - "不负责 CLI 参数解析、用户交互、进度展示与命令编排"
  - "不负责更新计划生成、差异检测或写入备份策略"

depends_on:
  - module: "fileutil"
    reason: "依赖文件存在性判断、文件读取以及目录扫描能力，用于从 .kontext 和 module_contracts 目录加载 YAML 配置"

public_interface:
  - name: "ArchitectureMap"
    signature: "type ArchitectureMap struct { Layers []Layer `yaml:\"layers\"`; Rules []Rule `yaml:\"rules\"` }"
    description: "描述项目分层架构与架构规则的顶层结构"
  - name: "Layer"
    signature: "type Layer struct { Name string `yaml:\"name\"`; Description string `yaml:\"description\"`; Packages []string `yaml:\"packages\"` }"
    description: "描述单个架构层的名称、说明和所属包"
  - name: "Rule"
    signature: "type Rule struct { Rule string `yaml:\"rule\"`; Reason string `yaml:\"reason\"` }"
    description: "描述一条架构规则及其原因"
  - name: "ModuleContract"
    signature: "type ModuleContract struct { Module ModuleInfo `yaml:\"module\"`; Owns []string `yaml:\"owns\"`; NotResponsibleFor []string `yaml:\"not_responsible_for\"`; DependsOn []ModuleDependency `yaml:\"depends_on\"`; PublicInterface []InterfaceItem `yaml:\"public_interface\"`; ModificationRules []ModificationRule `yaml:\"modification_rules\"` }"
    description: "定义模块职责边界、依赖关系、公开接口和修改约束的顶层结构"
  - name: "ModuleInfo"
    signature: "type ModuleInfo struct { Name string `yaml:\"name\"`; Path string `yaml:\"path\"`; Purpose string `yaml:\"purpose\"` }"
    description: "描述模块的基本元信息"
  - name: "ModuleDependency"
    signature: "type ModuleDependency struct { Module string `yaml:\"module\"`; Reason string `yaml:\"reason\"` }"
    description: "描述模块对另一个模块的依赖及其原因"
  - name: "InterfaceItem"
    signature: "type InterfaceItem struct { Name string `yaml:\"name\"`; Signature string `yaml:\"signature\"`; Description string `yaml:\"description\"` }"
    description: "描述模块公开接口的单个条目，包括名称、签名和功能说明"
  - name: "ModificationRule"
    signature: "type ModificationRule struct { Rule string `yaml:\"rule\"`; Reason string `yaml:\"reason\"` }"
    description: "描述修改模块时必须遵守的一条规则及其原因"
  - name: "Validate"
    signature: "func (c ModuleContract) Validate() error"
    description: "校验单个模块契约是否满足基础结构要求，如 owns 非空等"
  - name: "Conventions"
    signature: "type Conventions struct { Coding []ConventionItem `yaml:\"coding\"`; ErrorHandling []ConventionItem `yaml:\"error_handling\"`; Forbidden []ConventionItem `yaml:\"forbidden\"`; AIRules []ConventionItem `yaml:\"ai_rules\"` }"
    description: "描述项目编码规范、错误处理规范、禁用项与 AI 协作规则"
  - name: "ConventionItem"
    signature: "type ConventionItem struct { Rule string `yaml:\"rule\"`; Example string `yaml:\"example,omitempty\"`; Reason string `yaml:\"reason,omitempty\"` }"
    description: "描述单条规范内容、示例和原因"
  - name: "Bundle"
    signature: "type Bundle struct { Manifest ProjectManifest; Architecture ArchitectureMap; Conventions Conventions; Contracts []ModuleContract }"
    description: "聚合 .kontext 目录下已加载的全部配置数据"
  - name: "LoadBundle"
    signature: "func LoadBundle(kontextDir string) (*Bundle, error)"
    description: "从指定 .kontext 目录加载全部 YAML 配置；manifest 为必须项，其余物料缺失时按零值容错"
  - name: "ValidateBundle"
    signature: "func ValidateBundle(kontextDir string) []error"
    description: "校验指定 .kontext 目录下各 YAML 物料是否可读取、可解析，并检查基础必填字段"
  - name: "ProjectManifest"
    signature: "type ProjectManifest struct { Project Project `yaml:\"project\"`; TechStack TechStack `yaml:\"tech_stack\"`; Scale Scale `yaml:\"scale\"`; Status Status `yaml:\"status\"` }"
    description: "映射 PROJECT_MANIFEST.yaml 的顶层结构"
  - name: "Project"
    signature: "type Project struct { Name string `yaml:\"name\"`; OneLine string `yaml:\"one_line\"`; Type string `yaml:\"type\"`; BusinessContext string `yaml:\"business_context\"`; CoreFlows []CoreFlow `yaml:\"core_flows\"` }"
    description: "描述项目的基本信息和业务上下文"
  - name: "CoreFlow"
    signature: "type CoreFlow struct { Name string `yaml:\"name\"`; Steps []string `yaml:\"steps\"` }"
    description: "描述一条核心业务流程的名称和步骤"
  - name: "TechStack"
    signature: "type TechStack struct"
    description: "描述项目的技术栈信息，包括语言、框架和主要依赖等"
  - name: "Scale"
    signature: "type Scale struct"
    description: "描述项目的规模指标，如代码行数、模块数量等"
  - name: "Status"
    signature: "type Status struct"
    description: "描述项目当前的状态信息，如开发阶段、成熟度等"

modification_rules:
  - rule: "新增或修改 .kontext 物料字段时，必须先在 schema 中扩展对应结构体与 yaml 标签，再允许其他模块读写该字段。"
    reason: "schema 是物料结构的唯一契约中心，先改调用方会导致 YAML 与类型定义失配"
  - rule: "LoadBundle 的容错语义必须保持稳定：PROJECT_MANIFEST.yaml 为必需项，Architecture、Conventions、Contracts 缺失时只能返回零值而不能报错。"
    reason: "上层 validate、pack、update 等流程依赖这一加载策略组织控制流"
  - rule: "ValidateBundle 应聚焦于解析正确性和基础字段完整性，不应在此模块中引入源码扫描、依赖图推断或业务策略判断。"
    reason: "避免 schema 膨胀为流程编排模块，保持其作为数据契约层的边界"
  - rule: "所有 YAML 读写相关逻辑必须继续复用 fileutil 提供的文件存在性、目录存在性、读取和扫描能力，不要在 schema 中重复实现底层 I/O。"
    reason: "保持基础设施复用一致，避免出现分散的文件系统行为"
  - rule: "修改公开结构体字段名或 yaml 标签时必须考虑向后兼容，并同步评估对 generator、packer、updater、cmd/validate 的影响。"
    reason: "这些模块都会直接或间接消费 schema 定义，破坏字段兼容性会导致整条物料链路失效"
  - rule: "批量加载 module_contracts 目录时必须继续只处理 .yaml 和 .yml 文件，并对单文件失败采用局部容错或错误收集，而不是中断全部处理。"
    reason: "当前实现支持目录内逐文件处理，符合模块契约文件分散存储的使用方式"
  - rule: "对外暴露的类型应保持表达层面的中立，不嵌入 CLI、LLM 或模板相关依赖。"
    reason: "schema 位于配置与知识模型层，必须避免反向依赖上层模块从而形成循环依赖"