module:
  name: "templates"
  path: "templates"
  purpose: |
    提供通过 go:embed 嵌入到二进制中的提示词模板与文本资源常量，作为初始化、扫描分析、打包、更新等流程的静态模板资产来源。该模块只负责暴露模板内容本身，不负责模板渲染、变量填充、调用顺序控制或任何业务决策。

owns:
  - "嵌入并暴露 LLM 通用系统提示词与用户提示词模板"
  - "嵌入并暴露 init 流程中交互式生成、扫描分析、架构生成、契约生成、规范生成、依赖图生成等阶段的模板文本"
  - "嵌入并暴露 pack 流程中的文件识别、上下文精筛等模板文本"
  - "嵌入并暴露 update 流程中的 manifest、architecture、contract 更新模板文本"
  - "作为 generator、packer、updater、cmd 等上层模块共享的静态模板资产入口"

not_responsible_for:
  - "不负责模板变量渲染或占位符替换"
  - "不负责决定何时使用哪个模板"
  - "不负责调用 LLM、解析模型响应或校验输出"
  - "不负责文件读写、Prompt 落盘或 YAML 生成"
  - "不负责任何业务流程编排"

depends_on: []

public_interface:
  - name: "SystemPrompt"
    signature: "var SystemPrompt string"
    description: "LLM 通用系统提示词模板。"
  - name: "UserPrompt"
    signature: "var UserPrompt string"
    description: "LLM 通用用户提示词模板。"
  - name: "PackRefineSystem"
    signature: "var PackRefineSystem string"
    description: "Pack 精筛阶段使用的系统提示词模板。"
  - name: "PackRefineUser"
    signature: "var PackRefineUser string"
    description: "Pack 精筛阶段使用的用户提示词模板。"
  - name: "InitInterviewSystem"
    signature: "var InitInterviewSystem string"
    description: "init 交互式访谈阶段使用的系统提示词模板。"
  - name: "InitInterviewUser"
    signature: "var InitInterviewUser string"
    description: "init 交互式访谈阶段使用的用户提示词模板。"
  - name: "InitGenerateSystem"
    signature: "var InitGenerateSystem string"
    description: "init 基于需求摘要生成配置物料时使用的系统提示词模板。"
  - name: "InitGenerateUser"
    signature: "var InitGenerateUser string"
    description: "init 基于需求摘要生成配置物料时使用的用户提示词模板。"
  - name: "InitScanSystem"
    signature: "var InitScanSystem string"
    description: "源码扫描初始化总流程使用的系统提示词模板。"
  - name: "InitScanUser"
    signature: "var InitScanUser string"
    description: "源码扫描初始化总流程使用的用户提示词模板。"
  - name: "InitScanAnalyzeSystem"
    signature: "var InitScanAnalyzeSystem string"
    description: "扫描分析阶段使用的系统提示词模板。"
  - name: "InitScanAnalyzeUser"
    signature: "var InitScanAnalyzeUser string"
    description: "扫描分析阶段使用的用户提示词模板。"
  - name: "InitScanSelectSystem"
    signature: "var InitScanSelectSystem string"
    description: "扫描阶段选择关键文件时使用的系统提示词模板。"
  - name: "InitScanSelectUser"
    signature: "var InitScanSelectUser string"
    description: "扫描阶段选择关键文件时使用的用户提示词模板。"
  - name: "InitScanDepgraphSystem"
    signature: "var InitScanDepgraphSystem string"
    description: "生成模块依赖图时使用的系统提示词模板。"
  - name: "InitScanManifestSystem"
    signature: "var InitScanManifestSystem string"
    description: "生成 PROJECT_MANIFEST.yaml 时使用的系统提示词模板。"
  - name: "InitScanArchitectureSystem"
    signature: "var InitScanArchitectureSystem string"
    description: "生成 ARCHITECTURE_MAP.yaml 时使用的系统提示词模板。"
  - name: "InitScanConventionsSystem"
    signature: "var InitScanConventionsSystem string"
    description: "生成 CONVENTIONS.yaml 时使用的系统提示词模板。"
  - name: "InitScanContractSystem"
    signature: "var InitScanContractSystem string"
    description: "生成模块 CONTRACT.yaml 时使用的系统提示词模板。"
  - name: "PackIdentifyFilesSystem"
    signature: "var PackIdentifyFilesSystem string"
    description: "Pack 阶段识别相关文件时使用的系统提示词模板。"
  - name: "PackIdentifyFilesUser"
    signature: "var PackIdentifyFilesUser string"
    description: "Pack 阶段识别相关文件时使用的用户提示词模板。"
  - name: "UpdateSystem"
    signature: "var UpdateSystem string"
    description: "update 总体更新流程使用的系统提示词模板。"
  - name: "UpdateManifest"
    signature: "var UpdateManifest string"
    description: "更新 PROJECT_MANIFEST.yaml 时使用的模板。"
  - name: "UpdateArchitecture"
    signature: "var UpdateArchitecture string"
    description: "更新 ARCHITECTURE_MAP.yaml 时使用的模板。"
  - name: "UpdateContract"
    signature: "var UpdateContract string"
    description: "更新模块契约文件时使用的模板。"

modification_rules:
  - rule: "新增、重命名或删除模板变量时，必须同步更新所有引用该常量的上层模块代码。"
    reason: "templates 模块只暴露静态常量，上层通过显式变量名引用；名称变更会直接导致编译失败或运行流程缺失模板。"
  - rule: "模板文件应保持纯文本资源属性，不得在该模块中加入渲染函数、业务逻辑或外部服务调用。"
    reason: "架构上该模块被限定为模板资产层，渲染与调用时机应由 generator、packer、updater 等上层模块控制。"
  - rule: "修改模板内容时必须确保输出目标仍符合对应 schema、流程阶段和调用方预期。"
    reason: "这些模板直接影响 manifest、architecture、contract、prompt 等生成结果，语义漂移会破坏下游解析与校验。"
  - rule: "嵌入变量名应与模板用途一一对应，避免一个常量承载多个流程语义。"
    reason: "该模块的核心价值是为不同流程提供稳定、可定位的模板资产，语义混用会削弱可维护性。"
  - rule: "模板资源应继续通过 go:embed 方式内置到二进制，不应改为运行时外部依赖。"
    reason: "项目定位为跨平台单二进制 CLI，内嵌模板可保证分发一致性与离线可用性。"
  - rule: "若新增模板，应遵循现有命名约定，按流程与阶段清晰命名为可导出字符串变量。"
    reason: "统一命名有助于上层模块按阶段发现和使用模板，也符合当前模块公开接口风格。"