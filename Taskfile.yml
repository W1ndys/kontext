version: '3'

vars:
  BINARY_NAME: kontext
  DIST_DIR: dist

tasks:
  build:
    desc: Build for current platform
    cmds:
      - mkdir -p {{.DIST_DIR}}
      - go build -o {{.DIST_DIR}}/{{.BINARY_NAME}} .

  build:target:
    internal: true
    cmds:
      - mkdir -p {{.DIST_DIR}}
      - GOOS={{.GOOS}} GOARCH={{.GOARCH}} CGO_ENABLED=0 go build -o {{.DIST_DIR}}/{{.OUTPUT}} .

  build:darwin:amd64:
    desc: Build for macOS amd64
    cmds:
      - task: build:target
        vars:
          GOOS: darwin
          GOARCH: amd64
          OUTPUT: kontext_darwin_amd64

  build:darwin:arm64:
    desc: Build for macOS arm64
    cmds:
      - task: build:target
        vars:
          GOOS: darwin
          GOARCH: arm64
          OUTPUT: kontext_darwin_arm64

  build:linux:amd64:
    desc: Build for Linux amd64
    cmds:
      - task: build:target
        vars:
          GOOS: linux
          GOARCH: amd64
          OUTPUT: kontext_linux_amd64

  build:linux:arm64:
    desc: Build for Linux arm64
    cmds:
      - task: build:target
        vars:
          GOOS: linux
          GOARCH: arm64
          OUTPUT: kontext_linux_arm64

  build:windows:amd64:
    desc: Build for Windows amd64
    cmds:
      - task: build:target
        vars:
          GOOS: windows
          GOARCH: amd64
          OUTPUT: kontext_windows_amd64.exe

  build:windows:arm64:
    desc: Build for Windows arm64
    cmds:
      - task: build:target
        vars:
          GOOS: windows
          GOARCH: arm64
          OUTPUT: kontext_windows_arm64.exe

  build:all:
    desc: Build for all supported platforms
    deps:
      - build:darwin:amd64
      - build:darwin:arm64
      - build:linux:amd64
      - build:linux:arm64
      - build:windows:amd64
      - build:windows:arm64
